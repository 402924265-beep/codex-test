<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>洗碗机1月制造费差异核对</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>洗碗机1月制造费差异核对</h1>
          <p id="sourceLine">26实际 - 25同期，预算暂不纳入</p>
        </div>
        <button id="exportBtn" class="primary" type="button" disabled>导出分析表</button>
      </header>

      <section class="source-panel" aria-label="源文件">
        <div class="path-grid">
          <div class="path-field">
            <label for="actual26Path">26年财务报表路径</label>
            <input id="actual26Path" type="text" autocomplete="off" spellcheck="false">
          </div>
          <details class="advanced-paths">
            <summary>高级路径设置：25同期和4+8可信表</summary>
            <div class="path-field">
              <label for="actual25Path">25年同期财务报表路径</label>
              <input id="actual25Path" type="text" autocomplete="off" spellcheck="false">
            </div>
            <div class="path-field">
              <label for="reference4plus8Path">4+8可信表路径</label>
              <input id="reference4plus8Path" type="text" autocomplete="off" spellcheck="false">
            </div>
          </details>
        </div>
        <div class="action-row">
          <button id="loadBtn" type="button">读取并核对</button>
        </div>
        <div id="message" class="message" role="status"></div>
      </section>

      <section class="summary-grid" aria-label="核对摘要">
        <article class="metric">
          <span>26实际</span>
          <strong id="total26">-</strong>
          <small id="unit26">-</small>
        </article>
        <article class="metric">
          <span>25同期</span>
          <strong id="total25">-</strong>
          <small id="unit25">-</small>
        </article>
        <article class="metric">
          <span>差异</span>
          <strong id="diffTotal">-</strong>
          <small id="diffUnit">-</small>
        </article>
        <article class="metric">
          <span>4+8可信合计</span>
          <strong id="sapTotal">-</strong>
          <small id="fcNote">FC -</small>
        </article>
        <article class="metric">
          <span>科目状态</span>
          <strong id="statusCounts">-</strong>
          <small>25/26本月金额口径</small>
        </article>
      </section>

      <section class="chart-section" aria-label="大科目对比">
        <div class="section-head">
          <h2>大科目对比</h2>
          <span>折旧已包含FC汇率影响，不再单独加总</span>
        </div>
        <canvas id="categoryChart" height="220"></canvas>
      </section>

      <section class="reference-section" aria-label="4+8大科目校验">
        <div class="section-head">
          <h2>4+8大科目校验</h2>
          <span id="referenceSummary">-</span>
        </div>
        <div class="reference-wrap">
          <table class="reference-table">
            <thead>
              <tr>
                <th>大科目</th>
                <th>SAP明细K€</th>
                <th>4+8可信K€</th>
                <th>差异K€</th>
              </tr>
            </thead>
            <tbody id="referenceBody"></tbody>
          </table>
        </div>
      </section>

      <section class="table-section" aria-label="科目明细">
        <div class="section-head table-head">
          <h2>科目明细</h2>
          <div class="filters">
            <input id="searchInput" type="search" placeholder="搜索科目/描述">
            <select id="statusFilter" aria-label="科目状态">
              <option value="all">全部状态</option>
              <option value="both">两边都有</option>
              <option value="only_25">25有26无</option>
              <option value="only_26">26有25无</option>
              <option value="high">重点差异</option>
            </select>
            <select id="categoryFilter" aria-label="大科目">
              <option value="all">全部大科目</option>
            </select>
            <select id="sortBy" aria-label="排序">
              <option value="amount">按额差异</option>
              <option value="unit">按单台差异</option>
              <option value="code">按科目编码</option>
            </select>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>科目</th>
                <th>大科目</th>
                <th>25同期K€</th>
                <th>26实际K€</th>
                <th>额差异K€</th>
                <th>25单台€</th>
                <th>26单台€</th>
                <th>单台差异€</th>
                <th>状态</th>
                <th>差异分析</th>
              </tr>
            </thead>
            <tbody id="detailBody"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
